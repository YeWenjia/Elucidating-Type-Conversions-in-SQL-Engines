services:
  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: traf_mssql
    platform: linux/arm64/v8
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "reallyStrongPwd123"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  mssql-init:
    image: mcr.microsoft.com/mssql-tools:latest
    platform: linux/amd64
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "reallyStrongPwd123"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        for i in $(seq 1 60); do
          /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" >/dev/null 2>&1 && break
          echo "waiting for mssql..."; sleep 2
        done
        /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" \
          -Q "IF DB_ID('traf_spider') IS NULL CREATE DATABASE traf_spider;"
        echo "traf_spider database ready."
    restart: "no"

  oracle:
    image: gvenzl/oracle-free:latest
    container_name: traf_oracle
    environment:
      ORACLE_PASSWORD: password
      APP_USER: myuser
      APP_USER_PASSWORD: password
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

volumes:
  mssql_data:
  oracle_data:
