db: tests-examples/spider/club_1/tables/db.sqlite
inputs:
- tests-examples/spider/club_1/tables/student.csv
- tests-examples/spider/club_1/tables/club.csv
- tests-examples/spider/club_1/tables/member_of_club.csv
output: tests-examples/spider/club_1/tables/0006.csv
constants:
- Hopkins Student Enterprises
columns:
- clubname
sql: |-
  SELECT t3.lname
  FROM club  t1,
  member_of_club  t2,
  student  t3
  WHERE t1.clubname = 'Hopkins Student Enterprises' AND
  t1.clubid = t2.clubid AND
  t2.stuid = t3.stuid