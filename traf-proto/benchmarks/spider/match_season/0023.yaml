db: tests-examples/spider/match_season/tables/db.sqlite
inputs:
- tests-examples/spider/match_season/tables/match_season.csv
output: tests-examples/spider/match_season/tables/0023.csv
constants:
- '1'
functions:
- count
sql: |-
  SELECT position
  FROM match_season
  GROUP BY position
  ORDER BY count(*) DESC
