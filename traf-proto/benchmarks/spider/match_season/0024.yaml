db: tests-examples/spider/match_season/tables/db.sqlite
inputs:
- tests-examples/spider/match_season/tables/match_season.csv
output: tests-examples/spider/match_season/tables/0024.csv
constants:
- '3'
functions:
- count
sql: |-
  SELECT college
  FROM match_season
  GROUP BY college
  ORDER BY count(*) DESC
