db: tests-examples/spider/movie_1/tables/db.sqlite
inputs:
- tests-examples/spider/movie_1/tables/movie.csv
- tests-examples/spider/movie_1/tables/rating.csv
output: tests-examples/spider/movie_1/tables/0036.csv
functions:
- min
columns:
- stars
sql: |-
  SELECT t2.title,
         t1.rid,
         t1.stars,
         min(t1.stars)
  FROM rating AS t1
  JOIN movie AS t2 ON t1.mid = t2.mid
  GROUP BY t1.rid, t2.title, t1.stars
