db: tests-examples/spider/movie_1/tables/db.sqlite
inputs:
- tests-examples/spider/movie_1/tables/movie.csv
output: tests-examples/spider/movie_1/tables/0002.csv
constants:
- James Cameron
- '2000'
columns:
- director
- year
sql: |-
  SELECT title
  FROM movie
  WHERE director = 'James Cameron'
    AND year > 2000
