db: tests-examples/spider/machine_repair/tables/db.sqlite
inputs:
- tests-examples/spider/machine_repair/tables/technician.csv
output: tests-examples/spider/machine_repair/tables/0009.csv
constants:
- '2'
functions:
- count
sql: |-
  SELECT team
  FROM technician
  GROUP BY team
  HAVING COUNT(*) >= 2
