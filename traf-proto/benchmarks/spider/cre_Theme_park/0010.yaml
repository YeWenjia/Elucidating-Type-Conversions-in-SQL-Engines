db: tests-examples/spider/cre_Theme_park/tables/db.sqlite
inputs:
- tests-examples/spider/cre_Theme_park/tables/locations.csv
output: tests-examples/spider/cre_Theme_park/tables/0010.csv
constants:
- film
columns:
- location_name
filters:
- like
