db: tests-examples/spider/riding_club/tables/db.sqlite
inputs:
- tests-examples/spider/riding_club/tables/player.csv
output: tests-examples/spider/riding_club/tables/0005.csv
constants:
- Brandon
- Birtle
columns:
- residence
sql: |-
  SELECT sponsor_name
  FROM player
  WHERE residence = 'Brandon'
    OR residence = 'Birtle'
