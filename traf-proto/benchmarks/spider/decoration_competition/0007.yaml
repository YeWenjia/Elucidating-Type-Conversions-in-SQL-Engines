db: tests-examples/spider/decoration_competition/tables/db.sqlite
inputs:
- tests-examples/spider/decoration_competition/tables/member.csv
output: tests-examples/spider/decoration_competition/tables/0007.csv
constants:
- '2'
functions:
- count
sql: |-
  SELECT country
  FROM member
  GROUP BY country
  HAVING COUNT(*) > 2
