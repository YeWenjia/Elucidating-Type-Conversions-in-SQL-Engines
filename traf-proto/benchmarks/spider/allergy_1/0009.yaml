db: tests-examples/spider/allergy_1/tables/db.sqlite
inputs:
- tests-examples/spider/allergy_1/tables/allergy_type.csv
output: tests-examples/spider/allergy_1/tables/0009.csv
constants:
- '1'
functions:
- count
sql: |-
  select allergytype
  from allergy_type
  group by allergytype
  order by count(*) desc
