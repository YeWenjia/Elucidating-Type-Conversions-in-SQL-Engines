db: tests-examples/spider/tracking_grants_for_research/tables/db.sqlite
inputs:
- tests-examples/spider/tracking_grants_for_research/tables/project_staff.csv
output: tests-examples/spider/tracking_grants_for_research/tables/0004.csv
constants:
- '1'
- leader
functions:
- count
columns:
- project_id
- role_code
sql: |-
  SELECT date_from,
         date_to
  FROM project_staff
  WHERE project_id IN
      (SELECT project_id
       FROM project_staff
       GROUP BY project_id, date_from, date_to
       ORDER BY count(*) DESC)
  UNION
  SELECT date_from,
         date_to
  FROM project_staff
  WHERE role_code = 'leader'
