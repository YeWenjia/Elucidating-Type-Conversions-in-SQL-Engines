db: tests-examples/spider/perpetrator/tables/db.sqlite
inputs:
- tests-examples/spider/perpetrator/tables/perpetrator.csv
output: tests-examples/spider/perpetrator/tables/0014.csv
constants:
- '1'
functions:
- count
sql: |-
  SELECT country,
         COUNT(*)
  FROM perpetrator
  GROUP BY country
  ORDER BY COUNT(*) DESC
