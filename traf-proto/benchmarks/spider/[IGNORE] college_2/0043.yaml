db: tests-examples/spider/college_2/tables/db.sqlite
inputs:
- tests-examples/spider/college_2/tables/section.csv
output: tests-examples/spider/college_2/tables/0043.csv
constants:
- '1'
functions:
- count
sql: |-
  SELECT semester,
         year
  FROM section
  GROUP BY semester,
           year
  ORDER BY count(*) DESC
