db: tests-examples/spider/protein_institute/tables/db.sqlite
inputs:
- tests-examples/spider/protein_institute/tables/institution.csv
output: tests-examples/spider/protein_institute/tables/0007.csv
constants:
- '1990'
- Private
columns:
- founded
- type
sql: |-
  SELECT institution,
         location
  FROM institution
  WHERE founded > 1990
    AND type = 'Private'
