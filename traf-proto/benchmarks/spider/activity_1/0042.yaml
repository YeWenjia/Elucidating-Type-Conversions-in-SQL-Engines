db: tests-examples/spider/activity_1/tables/db.sqlite
inputs:
- tests-examples/spider/activity_1/tables/activity.csv
- tests-examples/spider/activity_1/tables/faculty_participates_in.csv
- tests-examples/spider/activity_1/tables/faculty.csv
output: tests-examples/spider/activity_1/tables/0042.csv
constants:
- Professor
- Canoeing
- Kayaking
columns:
- rank_col
- activity_name
sql: "SELECT lname\nFROM faculty\nWHERE rank_col = 'Professor'\nEXCEPT\nSELECT DISTINCT\
  \ t1.lname\nFROM faculty AS t1\nJOIN faculty_participates_in AS t2 ON t1.facid =\
  \ t2.facid\nJOIN activity AS t3 ON t2.actid = t2.actid\nWHERE t3.activity_name =\
  \ 'Canoeing'\n  OR t3.activity_name = 'Kayaking'"
