db: tests-examples/spider/activity_1/tables/db.sqlite
inputs:
  - tests-examples/spider/activity_1/tables/faculty.csv
output: tests-examples/spider/activity_1/tables/0008.csv
constants:
  - Jerry
  - Prince
columns:
  - fname
  - lname
sql: |-
  SELECT phone,
         room,
         building
  FROM faculty
  WHERE fname = 'Jerry'
    AND lname = 'Prince'
