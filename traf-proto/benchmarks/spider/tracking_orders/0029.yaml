db: tests-examples/spider/tracking_orders/tables/db.sqlite
inputs:
- tests-examples/spider/tracking_orders/tables/customers.csv
- tests-examples/spider/tracking_orders/tables/orders.csv
- tests-examples/spider/tracking_orders/tables/products.csv
- tests-examples/spider/tracking_orders/tables/order_items.csv
output: tests-examples/spider/tracking_orders/tables/0029.csv
constants:
- food
- '1'
functions:
- count
columns:
- product_name
sql: |-
  SELECT t1.customer_name
  FROM customers AS t1
  JOIN orders AS t2 ON t1.customer_id = t2.customer_id
  JOIN order_items AS t3 ON t2.order_id = t3.order_id
  JOIN products AS t4 ON t3.product_id = t4.product_id
  WHERE t4.product_name = 'food'
  GROUP BY t1.customer_id, t1.customer_name
  HAVING count(*) >= 1
