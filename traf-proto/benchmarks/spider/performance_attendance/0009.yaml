db: tests-examples/spider/performance_attendance/tables/db.sqlite
inputs:
- tests-examples/spider/performance_attendance/tables/performance.csv
output: tests-examples/spider/performance_attendance/tables/0009.csv
constants:
- '2'
functions:
- count
sql: |-
  SELECT location
  FROM performance
  GROUP BY location
  HAVING COUNT(*) >= 2
