db: tests-examples/spider/ship_1/tables/db.sqlite
inputs:
- tests-examples/spider/ship_1/tables/captain.csv
output: tests-examples/spider/ship_1/tables/0003.csv
constants:
- '50'
functions:
- count
columns:
- age
sql: |-
  SELECT count(*),
         rank_col
  FROM captain
  WHERE age < 50
  GROUP BY rank_col
