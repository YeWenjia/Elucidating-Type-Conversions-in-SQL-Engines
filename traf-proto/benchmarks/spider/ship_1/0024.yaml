db: tests-examples/spider/ship_1/tables/db.sqlite
inputs:
- tests-examples/spider/ship_1/tables/captain.csv
- tests-examples/spider/ship_1/tables/ship.csv
output: tests-examples/spider/ship_1/tables/0024.csv
constants:
- Midshipman
- Lieutenant
columns:
- rank_col
sql: "SELECT t1.name\nFROM ship AS t1\nJOIN captain AS t2 ON t1.ship_id = t2.ship_id\n\
  WHERE t2.rank_col = 'Midshipman' INTERSECT\n  SELECT t1.name\n  FROM ship AS t1\n\
  \  JOIN captain AS t2 ON t1.ship_id = t2.ship_id WHERE t2.rank_col = 'Lieutenant'"
