db: tests-examples/spider/company_office/tables/db.sqlite
inputs:
- tests-examples/spider/company_office/tables/companies.csv
output: tests-examples/spider/company_office/tables/0020.csv
constants:
- '2'
functions:
- count
sql: |-
  SELECT headquarters
  FROM companies
  GROUP BY headquarters
  HAVING COUNT(*) > 2
