db: tests-examples/spider/film_rank/tables/db.sqlite
inputs:
- tests-examples/spider/film_rank/tables/film.csv
output: tests-examples/spider/film_rank/tables/0021.csv
constants:
- Walter Hill
columns:
- director
sql: |-
  SELECT studio
  FROM film
  EXCEPT
  SELECT studio
  FROM film
  WHERE director = 'Walter Hill'
