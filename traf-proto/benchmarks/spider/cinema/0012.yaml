db: tests-examples/spider/cinema/tables/db.sqlite
inputs:
- tests-examples/spider/cinema/tables/cinema.csv
output: tests-examples/spider/cinema/tables/0012.csv
constants:
- '300'
- '2'
functions:
- count
columns:
- capacity
sql: |-
  SELECT location
  FROM cinema
  WHERE capacity > 300
  GROUP BY location
  HAVING count(*) >= 2
