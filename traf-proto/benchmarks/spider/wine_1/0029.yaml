db: tests-examples/spider/wine_1/tables/db.sqlite
inputs:
- tests-examples/spider/wine_1/tables/wine.csv
output: tests-examples/spider/wine_1/tables/0029.csv
constants:
- St. Helena
functions:
- max
columns:
- price
- score
- appelation
sql: |-
  SELECT max(price),
         max(score)
  FROM wine
  WHERE appelation = 'St. Helena'
