db: tests-examples/spider/wine_1/tables/db.sqlite
inputs:
- tests-examples/spider/wine_1/tables/wine.csv
output: tests-examples/spider/wine_1/tables/0031.csv
functions:
- avg
columns:
- price
- score
sql: |-
  SELECT avg(price),
         avg(score),
         appelation
  FROM wine
  GROUP BY appelation
