db: tests-examples/spider/party_host/tables/db.sqlite
inputs:
- tests-examples/spider/party_host/tables/host.csv
output: tests-examples/spider/party_host/tables/0009.csv
constants:
- '45'
- '35'
columns:
- age
sql: |-
  SELECT nationality
  FROM host
  WHERE age > 45 INTERSECT
    SELECT nationality
    FROM host WHERE age < 35
