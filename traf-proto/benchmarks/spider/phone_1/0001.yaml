db: tests-examples/spider/phone_1/tables/db.sqlite
inputs:
- tests-examples/spider/phone_1/tables/chip_model.csv
output: tests-examples/spider/phone_1/tables/0001.csv
constants:
- '2002'
- '2004'
columns:
- launch_year
sql: |-
  SELECT model_name
  FROM chip_model
  WHERE launch_year BETWEEN 2002 AND 2004;
