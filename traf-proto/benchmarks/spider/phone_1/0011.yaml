db: tests-examples/spider/phone_1/tables/db.sqlite
inputs:
- tests-examples/spider/phone_1/tables/phone.csv
output: tests-examples/spider/phone_1/tables/0011.csv
constants:
- '1'
functions:
- count
sql: |-
  SELECT company_name,
         count(*)
  FROM phone
  GROUP BY company_name
  ORDER BY count(*) ASC;
