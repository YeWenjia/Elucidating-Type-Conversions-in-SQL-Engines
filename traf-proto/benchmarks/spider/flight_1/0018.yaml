db: tests-examples/spider/flight_1/tables/db.sqlite
inputs:
- tests-examples/spider/flight_1/tables/employee.csv
output: tests-examples/spider/flight_1/tables/0018.csv
functions:
- avg
columns:
- salary
sql: |-
  SELECT name
  FROM employee
  WHERE salary >
      (SELECT avg(salary)
       FROM employee)
