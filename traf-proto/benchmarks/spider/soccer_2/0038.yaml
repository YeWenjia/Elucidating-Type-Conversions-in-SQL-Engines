db: tests-examples/spider/soccer_2/tables/db.sqlite
inputs:
- tests-examples/spider/soccer_2/tables/tryout.csv
output: tests-examples/spider/soccer_2/tables/0038.csv
constants:
- 'yes'
- goalie
columns:
- decision
- ppos
sql: |-
  SELECT cname
  FROM tryout
  WHERE decision = 'yes'
    AND ppos = 'goalie'
