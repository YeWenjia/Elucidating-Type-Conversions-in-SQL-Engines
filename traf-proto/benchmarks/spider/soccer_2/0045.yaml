db: tests-examples/spider/soccer_2/tables/db.sqlite
inputs:
- tests-examples/spider/soccer_2/tables/tryout.csv
output: tests-examples/spider/soccer_2/tables/0045.csv
constants:
- mid
- goalie
columns:
- ppos
sql: |-
  SELECT cname
  FROM tryout
  WHERE ppos = 'mid'
  EXCEPT
  SELECT cname
  FROM tryout
  WHERE ppos = 'goalie'
