db: tests-examples/spider/flight_company/tables/db.sqlite
inputs:
- tests-examples/spider/flight_company/tables/operate_company.csv
output: tests-examples/spider/flight_company/tables/0012.csv
constants:
- '1'
functions:
- count
sql: |-
  SELECT type,
         count(*)
  FROM operate_company
  GROUP BY type
  ORDER BY count(*) DESC
