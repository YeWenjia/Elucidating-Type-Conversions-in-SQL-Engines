db: tests-examples/spider/workshop_paper/tables/db.sqlite
inputs:
- tests-examples/spider/workshop_paper/tables/submission.csv
output: tests-examples/spider/workshop_paper/tables/0004.csv
constants:
- Florida
- Temple
columns:
- college
sql: |-
  SELECT author
  FROM submission
  WHERE college = 'Florida'
    OR college = 'Temple'
