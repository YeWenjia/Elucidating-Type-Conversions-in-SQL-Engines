db: tests-examples/spider/train_station/tables/db.sqlite
inputs:
- tests-examples/spider/train_station/tables/station.csv
output: tests-examples/spider/train_station/tables/0009.csv
constants:
- '15'
columns:
- number_of_platforms
sql: |-
  SELECT location
  FROM station
  EXCEPT
  SELECT location
  FROM station
  WHERE number_of_platforms >= 15
