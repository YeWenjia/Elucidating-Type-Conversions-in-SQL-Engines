db: tests-examples/spider/farm/tables/db.sqlite
inputs:
- tests-examples/spider/farm/tables/city.csv
output: tests-examples/spider/farm/tables/0018.csv
constants:
- '1500'
- '500'
columns:
- population
sql: |-
  SELECT status
  FROM city
  WHERE population > 1500 INTERSECT
    SELECT status
    FROM city WHERE population < 500
