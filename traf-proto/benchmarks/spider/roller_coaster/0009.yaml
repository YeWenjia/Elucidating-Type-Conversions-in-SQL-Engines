db: tests-examples/spider/roller_coaster/tables/db.sqlite
inputs:
- tests-examples/spider/roller_coaster/tables/roller_coaster.csv
output: tests-examples/spider/roller_coaster/tables/0009.csv
constants:
- '1'
functions:
- count
sql: |-
  SELECT status
  FROM roller_coaster
  GROUP BY status
  ORDER BY COUNT(*) DESC
