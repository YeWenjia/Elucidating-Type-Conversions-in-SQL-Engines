db: tests-examples/spider/restaurant_1/tables/db.sqlite
inputs:
- tests-examples/spider/restaurant_1/tables/student.csv
output: tests-examples/spider/restaurant_1/tables/0010.csv
constants:
- Linda
- Smith
columns:
- fname
- lname
sql: |-
  SELECT city_code
  FROM student
  WHERE fname = 'Linda'
    AND lname = 'Smith';
