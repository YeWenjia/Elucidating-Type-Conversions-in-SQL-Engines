db: tests-examples/spider/restaurant_1/tables/db.sqlite
inputs:
- tests-examples/spider/restaurant_1/tables/student.csv
output: tests-examples/spider/restaurant_1/tables/0016.csv
constants:
- '18'
- '600'
- F
columns:
- age
- major
- sex
sql: |-
  SELECT fname,
         lname
  FROM student
  WHERE age > 18
    AND major != 600
    AND sex = 'F';
