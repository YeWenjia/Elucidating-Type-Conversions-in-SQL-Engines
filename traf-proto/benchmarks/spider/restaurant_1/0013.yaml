db: tests-examples/spider/restaurant_1/tables/db.sqlite
inputs:
- tests-examples/spider/restaurant_1/tables/student.csv
output: tests-examples/spider/restaurant_1/tables/0013.csv
constants:
- '1'
functions:
- count
columns:
- major
sql: |-
  SELECT major,
         count(*)
  FROM student
  GROUP BY major
  ORDER BY count(major) ASC;
