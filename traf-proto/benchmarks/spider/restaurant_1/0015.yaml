db: tests-examples/spider/restaurant_1/tables/db.sqlite
inputs:
- tests-examples/spider/restaurant_1/tables/student.csv
output: tests-examples/spider/restaurant_1/tables/0015.csv
constants:
- '18'
- '600'
columns:
- age
- major
sql: |-
  SELECT fname,
         lname
  FROM student
  WHERE age > 18
    AND major = 600;
