db: tests-examples/spider/epinions_1/tables/db.sqlite
inputs:
- tests-examples/spider/epinions_1/tables/item.csv
- tests-examples/spider/epinions_1/tables/review.csv
output: tests-examples/spider/epinions_1/tables/0015.csv
constants:
- '3'
- '5'
functions:
- avg
columns:
- rank_col
- rating
sql: "SELECT t1.title\nFROM item AS t1\nJOIN review AS t2 ON t1.i_id = t2.i_id\nWHERE\
  \ t2.rank_col > 3 INTERSECT\n  SELECT t1.title\n  FROM item AS t1\n  JOIN review\
  \ AS t2 ON t1.i_id = t2.i_id\nGROUP BY t2.i_id, t1.title\nHAVING avg(t2.rating)\
  \ > 5"
