db: tests-examples/spider/program_share/tables/db.sqlite
inputs:
- tests-examples/spider/program_share/tables/channel.csv
output: tests-examples/spider/program_share/tables/0008.csv
constants:
- CCTV
functions:
- sum
columns:
- share_in_percent
sql: |-
  SELECT sum(share_in_percent)
  FROM channel
  WHERE owner = 'CCTV'
