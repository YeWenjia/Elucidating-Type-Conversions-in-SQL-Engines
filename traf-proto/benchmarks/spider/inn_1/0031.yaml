db: tests-examples/spider/inn_1/tables/db.sqlite
inputs:
- tests-examples/spider/inn_1/tables/rooms.csv
output: tests-examples/spider/inn_1/tables/0031.csv
functions:
- avg
columns:
- baseprice
sql: |-
  SELECT roomname
  FROM rooms
  WHERE baseprice >
      (SELECT avg(baseprice)
       FROM rooms);
