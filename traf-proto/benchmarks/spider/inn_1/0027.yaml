db: tests-examples/spider/inn_1/tables/db.sqlite
inputs:
- tests-examples/spider/inn_1/tables/rooms.csv
output: tests-examples/spider/inn_1/tables/0027.csv
constants:
- '120'
functions:
- count
columns:
- baseprice
sql: |-
  SELECT decor,
         count(*)
  FROM rooms
  WHERE baseprice > 120
  GROUP BY decor;
