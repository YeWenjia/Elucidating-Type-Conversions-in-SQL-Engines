db: tests-examples/spider/culture_company/tables/db.sqlite
inputs:
- tests-examples/spider/culture_company/tables/movie.csv
output: tests-examples/spider/culture_company/tables/0015.csv
constants:
- '1999'
- '2000'
columns:
- year
sql: |-
  SELECT director
  FROM movie
  WHERE year = 1999
    OR year = 2000
