db: tests-examples/spider/college_1/tables/db.sqlite
inputs:
- tests-examples/spider/college_1/tables/department.csv
- tests-examples/spider/college_1/tables/student.csv
output: tests-examples/spider/college_1/tables/0066.csv
constants:
- '1'
functions:
- count
sql: |-
  SELECT t2.dept_name,
         t2.dept_address
  FROM student AS t1
  JOIN department AS t2 ON t1.dept_code = t2.dept_code
  GROUP BY t1.dept_code, t2.dept_name, t2.dept_address
  ORDER BY count(*) DESC
